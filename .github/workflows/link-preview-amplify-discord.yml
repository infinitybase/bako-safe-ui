name: '🚀 Preview Discord'

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  notify-discord:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: 📤 Preview Discord
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_FULL: ${{ github.repository }}    
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
        run: |
          PREVIEW_URL="https://pr-${PR_NUMBER}.${AMPLIFY_APP_ID}.amplifyapp.com"
          PR_URL="https://github.com/${REPO_FULL}/pull/${PR_NUMBER}"

          echo "Repo full: ${REPO_FULL}"
          
          # Pega HEAD SHA do PR
          PR_JSON=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${REPO_FULL}/pulls/${PR_NUMBER}")
          
          PR_HEAD=$(echo "$PR_JSON" | jq -r '.head.sha // empty')
          
          # Pega mensagem do commit HEAD
          COMMIT_MSG=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${REPO_FULL}/commits/${PR_HEAD}" \
            | jq -r '.commit.message // empty | split("\n")[0]' || echo "Novo commit")
          
          echo "🔍 HEAD SHA: ${PR_HEAD:0:7}"
          echo "📝 Commit: '${COMMIT_MSG}'"
          
          cat > /tmp/preview.json << EOF
          {
            "content": "🚀 Preview disponível!",
            "embeds": [{
              "title": "[${REPO_NAME}] PR #${PR_NUMBER}",
              "description": "**${COMMIT_MSG}**",
              "url": "${PR_URL}",
              "color": 5814783,
              "fields": [
                {
                  "name": "👤 Autor",
                  "value": "${PR_AUTHOR}",
                  "inline": true
                },
                {
                  "name": "🔗 Preview",
                  "value": "${PREVIEW_URL}",
                  "inline": false
                }
              ],
              "footer": {
                "text": "Amplify Hosting"
              }
            }]
          }
          EOF
          
          curl -s \
            -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @/tmp/preview.json > /dev/null
          
          rm /tmp/preview.json
